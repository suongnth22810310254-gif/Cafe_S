<!DOCTYPE html>
<html>
<head>
    <title>🧪 Debug Test - Coffee S</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .test-section { background: #f0f8ff; border: 1px solid #0066cc; border-radius: 8px; padding: 20px; margin: 20px 0; }
        .btn { background: #0066cc; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 10px 5px; }
        .btn:hover { background: #0052a3; }
        .result { background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; padding: 15px; margin: 10px 0; white-space: pre-wrap; }
        .success { border-color: #28a745; background: #d4edda; }
        .error { border-color: #dc3545; background: #f8d7da; }
        input[type="text"], input[type="email"] { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 300px; margin: 5px; }
    </style>
</head>
<body>
    <h1>🧪 DEBUG TEST - FORGOT PASSWORD & REGISTER</h1>
    
    <div class="test-section">
        <h3>🔧 TEST 1: FORGOT PASSWORD</h3>
        <label>Email:</label>
        <input type="email" id="forgotEmail" value="test@example.com">
        <button class="btn" onclick="testForgotPassword()">🚀 Test Forgot Password</button>
        <div id="forgotResult" class="result" style="display: none;"></div>
    </div>

    <div class="test-section">
        <h3>📝 TEST 2: REGISTER</h3>
        <label>Username:</label>
        <input type="text" id="regUsername" value="">
        <label>Email:</label>
        <input type="email" id="regEmail" value="">
        <br>
        <label>Full Name:</label>
        <input type="text" id="regFullName" value="Test User">
        <label>Phone:</label>
        <input type="text" id="regPhone" value="0366413924">
        <br>
        <label>Address:</label>
        <input type="text" id="regAddress" value="123 Test Street" style="width: 400px;">
        <br>
        <button class="btn" onclick="generateRandomUser()">🎲 Random User</button>
        <button class="btn" onclick="testRegister()">📝 Test Register</button>
        <div id="registerResult" class="result" style="display: none;"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        
        function generateRandomUser() {
            const timestamp = Date.now().toString().slice(-6);
            document.getElementById('regUsername').value = `testuser${timestamp}`;
            document.getElementById('regEmail').value = `testuser${timestamp}@example.com`;
        }
        
        async function testForgotPassword() {
            const email = document.getElementById('forgotEmail').value;
            const resultDiv = document.getElementById('forgotResult');
            
            console.log('🔍 Testing forgot password for:', email);
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.textContent = '⏳ Testing forgot password...';
            
            const startTime = Date.now();
            
            try {
                const response = await fetch(`${API_BASE}/api/password/forgot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const duration = Date.now() - startTime;
                const data = await response.json();
                
                console.log('🔍 Forgot password response:', data);
                
                if (response.ok && data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ SUCCESS!\nTime: ${duration}ms\nOTP: ${data.debug?.otp || 'Hidden'}\nMessage: ${data.message}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ FAILED!\nStatus: ${response.status}\nError: ${data.message}\nDetails: ${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                const duration = Date.now() - startTime;
                console.error('🚨 Forgot password error:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = `💥 NETWORK ERROR!\nTime: ${duration}ms\nError: ${error.message}`;
            }
        }
        
        async function testRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const fullName = document.getElementById('regFullName').value;
            const phone = document.getElementById('regPhone').value;
            const address = document.getElementById('regAddress').value;
            
            const resultDiv = document.getElementById('registerResult');
            
            console.log('📝 Testing register for:', { username, email, fullName });
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.textContent = '⏳ Testing register...';
            
            const startTime = Date.now();
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        email,
                        password: 'TestPass123!',
                        fullName,
                        phone,
                        address
                    })
                });
                
                const duration = Date.now() - startTime;
                const data = await response.json();
                
                console.log('📝 Register response:', data);
                
                if (response.ok && data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ SUCCESS!\nTime: ${duration}ms\nMessage: ${data.message}\nToken: ${data.debug?.verifyToken || 'Hidden'}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ FAILED!\nStatus: ${response.status}\nError: ${data.message}\nDetails: ${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                const duration = Date.now() - startTime;
                console.error('🚨 Register error:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = `💥 NETWORK ERROR!\nTime: ${duration}ms\nError: ${error.message}`;
            }
        }
        
        // Auto-generate user on page load
        window.onload = function() {
            generateRandomUser();
        };
        
        // Check server status
        fetch(`${API_BASE}/api/health`)
            .then(() => console.log('✅ Server is running'))
            .catch(() => console.log('❌ Server is NOT running'));
    </script>
</body>
</html>
